<html>
<head></head>
<body>

<center>
 <h3><b>DRF ECOM PLATFORM </b> </h3>
 </center>
&nbsp;
<hr>
<h2><font color="LightSalmon">Enter the Details to Return Product</font></h2>
<form>

<label>Enter Your  Full Name <font color="red">*</font> </label>
<input type="text" placeholder="Enter Name" required pattern="[a-z A-Z]+">
<br><br>

<label>Enter Phone Number<font color="red">*</font></label>
<input type="number" required pattern="[6798] [0-9] {9}">
<br><br>

<label>Enter Gmail<font color="red">*</font> </label>
<input type="email" required>
<br><br>

<label>Gender</label>
<input type="radio" name="abc">Male
<input type="radio" name="abc">Female
<br><br>

<label>Location</label>
<input list="City">
<datalist id="City">
  <option>Hyderbad</option>
  <option>Nizamabad</option>
 <option>karminagar</option>
<option>Warangal</option>
</datalist>
<br><br>

<label>ISSUES</label>
<br><br>
<input type="checkbox">Network Issue <br><br>
<input type="checkbox">Wrong Product <br><br>
<input type="checkbox">Damaged product <br><br>
<input type="checkbox">Not Avalaible COD <br><br>
<input type="checkbox">Wrong size/colour <br><br>

<label>Categery</label>
<select>
  <option>Fashion</option>
  <option>Electronics</option>
<option>Kitchen</option>
<option>Grocerys</option>
<option>games</option>
</select>
 <br><br>

<label>Order Recived Date & Time</label>
<br><br>
<input type="date">
<br><br>
<label>Upload the image of product</label><br>
<input type="file">

<br><br>
<label>Reason for cancellation/Feedback</label><br>
<textarea cols="25",row="20"></textarea>

<br><br>
<button type="submit" align="center">Submit</button>

</form>
</body>
</html>
